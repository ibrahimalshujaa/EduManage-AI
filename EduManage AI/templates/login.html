<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | EduManage AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: radial-gradient(circle at top right, #1E293B, #020617);
        }
        .login-card {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .login-logo {
            font-size: 32px;
            font-weight: 800;
            color: var(--accent);
            margin-bottom: 8px;
        }
        .login-subtitle {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 32px;
        }
        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        .form-group input {
            width: 100%;
            background: rgba(2, 6, 23, 0.5);
            border: 1px solid var(--border);
            padding: 12px 16px;
            border-radius: 10px;
            color: white;
            outline: none;
            transition: all 0.3s ease;
        }
        .form-group input:focus {
            border-color: var(--accent);
            background: rgba(2, 6, 23, 0.8);
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            margin-top: 10px;
        }
        .flash-messages {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-logo">EduManage AI</div>
        <div class="login-subtitle">Sign in to access your dashboard</div>
        
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div class="flash-messages">
              {% for message in messages %}
                {{ message }}
              {% endfor %}
            </div>
          {% endif %}
        {% endwith %}

        <form action="/login" method="POST">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Enter your username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-primary login-btn">Sign In</button>
        </form>
        
        <div style="margin-top: 24px; font-size: 12px; color: var(--text-secondary);">
            Institutional Access Required
        </div>
    </div>
</body>
</html>
